[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = [
    "E501",  # line length handled by formatter, not lint
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F401"]  # unused imports in conftest are intentional

[tool.pytest.ini_options]
testpaths = ["tests"]
